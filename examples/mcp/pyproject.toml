[project]
name = "blf-example-mcp"
version = "0.1.0"
description = "Connect a BLF agent to an MCP server to use remote tools (numerical operations) instead of local Python."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "branchlayerflow",
    "openai>=1.0",
    "mcp>=1.0",
]

[tool.uv.sources]
branchlayerflow = { workspace = true }
