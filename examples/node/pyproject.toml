[project]
name = "blf-example-node"
version = "0.1.0"
description = "Single agent demonstrating retry + fallback via BLF inheritance — override _takeover for cross-cutting retry, define a fallback hook the work method can call when retries are exhausted."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "branchlayerflow",
    "openai>=1.0",
]

[tool.uv.sources]
branchlayerflow = { workspace = true }
