<svg viewBox="0 0 236 236" fill="none" xmlns="http://www.w3.org/2000/svg">
    <title>BLF Morse Code Logo</title>
    <desc>B: -..., L: .-.., F: ..-.</desc>

    <!-- B: -... -->
    <g id="B">
        <rect x="0" y="23" width="80" height="30" rx="15" fill="#1a202c"/>
        <circle cx="120" cy="38" r="15" fill="#1a202c"/>
        <circle cx="170" cy="38" r="15" fill="#1a202c"/>
        <circle cx="221" cy="38" r="15" fill="#1a202c"/>
    </g>

    <!-- L: .-.. -->
    <g id="L">
        <circle cx="15" cy="118" r="15" fill="#1a202c"/>
        <rect x="50" y="103" width="80" height="30" rx="15" fill="#1a202c"/>
        <circle cx="170" cy="118" r="15" fill="#1a202c"/>
        <circle cx="221" cy="118" r="15" fill="#1a202c"/>
    </g>

    <!-- F: ..-. -->
    <g id="F">
        <circle cx="15" cy="198" r="15" fill="#1a202c"/>
        <circle cx="65" cy="198" r="15" fill="#1a202c"/>
        <rect x="100" y="183" width="80" height="30" rx="15" fill="#1a202c"/>
        <circle cx="221" cy="198" r="15" fill="#1a202c"/>
    </g>
</svg>