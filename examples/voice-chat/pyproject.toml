[project]
name = "blf-example-voice-chat"
version = "0.1.0"
description = "Mic-in -> Whisper transcript -> chat -> TTS speaker-out, in a loop with VAD."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "branchlayerflow",
    "openai>=1.0",
    "sounddevice>=0.4",
    "soundfile>=0.12",
    "numpy>=1.20",
]

[tool.uv.sources]
branchlayerflow = { workspace = true }
